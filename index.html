<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MOLD</title>

<script>
var SystemPath = {
  APPLICATION:'application',EXTENSION:'extension',
  SYSTEM:'system',USER_DATA:'userData',HOST_APPLICATION:'hostApplication'
};
function CSInterface(){
  var _cep=window.__adobe_cep__;
  if(!_cep) throw new Error('__adobe_cep__ not found.');
  this.getSystemPath    =function(p){return _cep.getSystemPath(p);};
  this.evalScript       =function(s,cb){_cep.evalScript(s,cb||function(){});};
  this.getHostEnvironment=function(){return JSON.parse(_cep.getHostEnvironment());};
}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#1a1a1a; --surface:#232323; --border:#2e2e2e; --border-focus:#555;
  --text:#d4d4d4; --dim:#555; --text-dim:#666;
  --accent:#e8b84b; --accent-dim:rgba(232,184,75,0.10); --accent-hover:rgba(232,184,75,0.18);
  --danger:#c0392b; --success:#27ae60;
  --radius:6px; --r-sm:3px;
}

html,body{
  width:100%;height:100%;
  background:var(--bg);
  overflow:hidden;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
}

/* ══════════════════════════════════════════
   TOOLBAR  — pure CSS sizing, no JS sizing
   Buttons are square: width = panel width - padding.
   height uses aspect-ratio 1/1 so they auto-square.
   Max-width/height caps at 44px so they don't bloat.
   ══════════════════════════════════════════ */
/* ══ TOOLBAR — portrait strip ══ */
#toolbar{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;
  padding:4px 3px;
  gap:4px;
  overflow:hidden;
}

/* ›› expand button — full width, small height */
#expand-btn{
  width:100%;height:16px;
  flex-shrink:0;
  background:none;border:none;
  color:var(--dim);font-size:8px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  letter-spacing:-1px;line-height:1;
  transition:color .15s;border-radius:2px;
}
#expand-btn:hover{color:var(--text);}

.divider-h{
  width:80%;height:1px;
  background:var(--border);flex-shrink:0;
}

/* button container — vertical stack */
#tpl-btn-container{
  display:flex;flex-direction:column;
  align-items:center;
  gap:4px;width:100%;flex-shrink:0;
}

/* Square buttons — fixed 36px */
.tpl-btn{
  display:flex;align-items:center;justify-content:center;
  width:36px;
  height:36px;
  flex-shrink:0;
  border-radius:var(--radius);border:none;
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  font-weight:500;color:#fff;
  position:relative;
  transition:filter .12s,transform .1s;
  user-select:none;
}
.tpl-btn:hover {filter:brightness(1.22);transform:scale(1.07);}
.tpl-btn:active{filter:brightness(0.82);transform:scale(0.96);}

/* tooltip — pops to the right */
.tpl-btn::after{
  content:attr(data-name);
  position:fixed;left:56px;
  background:#111;border:1px solid var(--border);
  color:var(--text);font-size:9px;
  white-space:nowrap;padding:3px 7px;border-radius:3px;
  pointer-events:none;opacity:0;transition:opacity .15s;z-index:500;
}
.tpl-btn:hover::after{opacity:1;}

#no-templates{
  font-size:7px;color:#333;
  text-align:center;line-height:1.8;
  padding:4px 0;user-select:none;
}



/* status flash */
#status-flash{
  position:fixed;bottom:6px;left:50%;transform:translateX(-50%);
  background:#111;border:1px solid var(--border);border-radius:3px;
  padding:3px 8px;font-size:8px;letter-spacing:.06em;
  color:var(--dim);white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .2s;z-index:700;
}
#status-flash.show    {opacity:1;}
#status-flash.ok {color:var(--success);border-color:var(--success);}
#status-flash.err{color:var(--danger); border-color:var(--danger);}

/* ══════════════════════════════════════════
   MANAGE OVERLAY — slides over toolbar
   ══════════════════════════════════════════ */
#manage-overlay{
  position:absolute;inset:0;
  background:var(--bg);
  display:none;
  flex-direction:column;
  font-family:'IBM Plex Sans',sans-serif;
  font-size:11px;color:var(--text);
  z-index:400;overflow:hidden;
}
#manage-overlay.open{display:flex;}

#mg-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px 6px;flex-shrink:0;
}
#mg-title{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;font-weight:500;
  letter-spacing:.14em;color:var(--dim);
  text-transform:uppercase;
}
#mg-close-btn{
  background:none;border:none;color:var(--dim);
  font-size:10px;cursor:pointer;padding:2px 4px;
  letter-spacing:-1px;line-height:1;border-radius:2px;
  transition:color .12s;
}
#mg-close-btn:hover{color:var(--text);background:rgba(255,255,255,.04);}

.mg-divider{height:1px;background:var(--border);flex-shrink:0;}

#mg-tpl-list{
  display:flex;flex-direction:column;gap:2px;
  max-height:110px;overflow-y:auto;flex-shrink:0;
  padding:4px 8px;
}
.tmpl-item{
  display:flex;align-items:center;gap:7px;
  padding:4px 7px;
  border:1px solid transparent;border-radius:var(--r-sm);
  cursor:pointer;transition:background .1s,border-color .1s;
}
.tmpl-item:hover{background:var(--surface);border-color:var(--border);}
.tmpl-item.selected{background:var(--accent-dim);border-color:var(--accent);}
.tmpl-swatch{width:11px;height:11px;border-radius:2px;flex-shrink:0;}
.tmpl-item-name{
  flex:1;font-size:10px;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.tmpl-item.selected .tmpl-item-name{color:var(--accent);}
.tmpl-item-del{
  background:none;border:none;color:#333;
  font-size:13px;cursor:pointer;line-height:1;padding:0 2px;
  transition:color .1s;flex-shrink:0;
}
.tmpl-item-del:hover{color:var(--danger);}

#mg-editor{
  flex:1;display:flex;flex-direction:column;gap:6px;
  padding:8px 10px 0;min-height:0;overflow:hidden;
}
.field-row{display:flex;gap:5px;align-items:center;}
.field-row input[type="text"]{flex:1;}

input[type="text"],textarea{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:'IBM Plex Sans',sans-serif;
  font-size:11px;padding:5px 7px;border-radius:var(--r-sm);
  outline:none;width:100%;transition:border-color .15s;
}
input[type="text"]:focus,textarea:focus{border-color:var(--border-focus);}
input[type="text"]::placeholder,textarea::placeholder{color:#333;}

textarea{
  flex:1;resize:none;min-height:0;
  font-family:'IBM Plex Mono',monospace;font-size:9px;line-height:1.9;
}

#mg-label-input{
  width:34px!important;flex-shrink:0;
  text-align:center;
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;
  padding:4px 3px;
}

#mg-colour-row{
  display:flex;gap:4px;align-items:center;flex-wrap:wrap;
}
.colour-swatch{
  width:16px;height:16px;border-radius:3px;
  cursor:pointer;border:2px solid transparent;
  transition:border-color .12s,transform .1s;flex-shrink:0;
}
.colour-swatch:hover{transform:scale(1.18);}
.colour-swatch.active{border-color:#fff;}

.mg-hint{
  font-family:'IBM Plex Mono',monospace;font-size:8px;
  color:#383838;letter-spacing:.04em;flex-shrink:0;
}

#mg-actions{display:flex;gap:5px;flex-shrink:0;padding:8px 10px 10px;}
.act-btn{
  flex:1;padding:7px 4px;background:none;
  border:1px solid var(--border);color:var(--text-dim);
  font-family:'IBM Plex Mono',monospace;font-size:8px;
  letter-spacing:.1em;text-transform:uppercase;
  border-radius:var(--r-sm);cursor:pointer;
  transition:border-color .15s,color .15s,background .15s;
}
.act-btn:hover{border-color:var(--border-focus);color:var(--text);}
.act-btn.primary{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.act-btn.primary:hover{background:var(--accent-hover);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- ══ MODE 1: TOOLBAR ══ -->
<div id="toolbar">
  <button id="expand-btn" title="Manage templates" onclick="openManage()">››</button>
  <div class="divider-h"></div>
  <div id="tpl-btn-container">
    <div id="no-templates">No<br>tpls</div>
  </div>
</div>

<!-- ══ MODE 2: MANAGE OVERLAY ══ -->
<div id="manage-overlay">
  <div id="mg-header">
    <span id="mg-title">Templates</span>
    <button id="mg-close-btn" onclick="closeManage()">‹‹</button>
  </div>
  <div class="mg-divider"></div>
  <div id="mg-tpl-list"></div>
  <div class="mg-divider"></div>
  <div id="mg-editor">
    <div class="field-row">
      <input type="text" id="mg-name-input"  placeholder="Template name…"/>
      <input type="text" id="mg-label-input" maxlength="2" placeholder="1"
             title="Button label (1–2 chars)"/>
    </div>
    <div id="mg-colour-row"></div>
    <textarea id="mg-folders-input"
      placeholder="01_FOOTAGE&#10;02_AUDIO&#10;/SFX&#10;/MUSIC&#10;//STEMS&#10;03_GRAPHICS"></textarea>
    <span class="mg-hint">no prefix = bin · / = child · // = grandchild</span>
  </div>
  <div id="mg-actions">
    <button class="act-btn"         onclick="mgNewTemplate()">+ New</button>
    <button class="act-btn primary" onclick="mgSaveTemplate()">Save</button>
  </div>
</div>

<div id="status-flash"></div>

<script>
(function(){
'use strict';

var PALETTE=[
  '#e05252','#e07c52','#e0c052','#7ec852',
  '#52c8a0','#52a8e0','#7052e0','#b852e0',
  '#e052a8','#888888'
];

/* ── DEBUG ── */
function log(){}
function toggleDebug(){}

/* ── STATUS ── */
var _sf=document.getElementById('status-flash'),_sfT=null;
function flash(msg,type){
  _sf.textContent=msg;
  _sf.className='show'+(type?' '+type:'');
  clearTimeout(_sfT);
  _sfT=setTimeout(function(){_sf.className='';},2500);
}

/* ── CEP ── */
var cs=null,fs_n=null,path_n=null,TEMPLATES_FILE=null;
try{
  cs=new CSInterface();
  try{var env=cs.getHostEnvironment();}
  catch(e){}
  try{
    var extRoot=cs.getSystemPath(SystemPath.EXTENSION);
    extRoot=decodeURIComponent(extRoot)
      .replace(/^file:\/\/\//,'').replace(/^file:\/\//,'').replace(/\//g,'\\');
    
    if(typeof cep_node!=='undefined'){
      fs_n=cep_node.require('fs');
      path_n=cep_node.require('path');
      TEMPLATES_FILE=path_n.join(extRoot,'templates.json');
      
    } else { }
  }catch(e){}
}catch(e){flash('Not in Premiere','err');}

/* ════════════════════════════════
   SUBFOLDER PARSER
   Converts shorthand syntax to flat
   path array that host.jsx expects.

   Input lines:
     01_FOOTAGE         → "01_FOOTAGE"
     02_AUDIO           → "02_AUDIO"
     /SFX               → "02_AUDIO/SFX"
     /MUSIC             → "02_AUDIO/MUSIC"
     //STEMS            → "02_AUDIO/MUSIC/STEMS"
     03_GRAPHICS        → "03_GRAPHICS"

   Algorithm:
   - Count leading '/' = depth (0 = root)
   - Maintain a stack of the current
     ancestor at each depth level
   - Build full path = stack[0..depth-1] + name
   ════════════════════════════════ */
function parseFolders(raw){
  var lines=raw.split('\n');
  var paths=[];
  /* ancestors[d] = name of the last bin seen at depth d */
  var ancestors=[];

  lines.forEach(function(line){
    var stripped=line.replace(/\r/,'');
    if(!stripped.trim()) return; /* skip blank */

    /* count leading slashes = depth */
    var depth=0;
    while(depth<stripped.length && stripped[depth]==='/') depth++;
    var name=stripped.slice(depth).trim();
    if(!name) return;

    if(depth===0){
      /* root-level bin */
      ancestors=[name];
      paths.push(name);
    } else {
      /* child: build path from ancestors up to depth-1, then name */
      /* trim ancestors stack to depth so we don't reference stale parents */
      ancestors.length=depth; /* truncate any deeper entries */
      ancestors[depth]=name;
      var fullPath=ancestors.slice(0,depth).join('/')+'/'+name;
      paths.push(fullPath);
    }
  });

  return paths;
}

/* ── SHARED STATE ── */
var templates=[];

function loadTemplates(){
  if(!fs_n||!TEMPLATES_FILE){renderButtons();return;}
  try{
    if(fs_n.existsSync(TEMPLATES_FILE)){
      templates=JSON.parse(fs_n.readFileSync(TEMPLATES_FILE,'utf8'));
      
    } else {templates=[];}
  }catch(e){templates=[];}
  renderButtons();
}

function persistTemplates(){
  if(!fs_n||!TEMPLATES_FILE) return;
  try{
    fs_n.writeFileSync(TEMPLATES_FILE,JSON.stringify(templates,null,2),'utf8');
    
  }catch(e){}
}

/* ════════════════════════════════
   MODE 1 — TOOLBAR
   ════════════════════════════════ */
function renderButtons(){
  var c=document.getElementById('tpl-btn-container');
  c.innerHTML='';
  if(!templates.length){
    var h=document.createElement('div');
    h.id='no-templates';h.innerHTML='No<br>tpls';c.appendChild(h);return;
  }
  templates.forEach(function(t,i){
    var color=t.color||PALETTE[i%PALETTE.length];
    var label=(t.label!==undefined&&t.label!=='')?t.label:String(i+1);
    var btn=document.createElement('button');
    btn.className='tpl-btn';
    btn.style.background=color;
    btn.textContent=label;
    btn.setAttribute('data-name',t.name);
    btn.addEventListener('click',function(){runTemplate(i);});
    c.appendChild(btn);
  });
  
}

function runTemplate(i){
  var t=templates[i];
  if(!t){return;}
  if(!cs){flash('CEP unavailable','err');return;}
  

  cs.evalScript('getProjectFolder()',function(result){
    
    if(!result||result==='NO_PROJECT'){flash('No project open','err');return;}
    if(result.indexOf('ERROR:')===0){flash('ExtendScript error','err');return;}

    /* use parser to expand /subfolder syntax */
    var paths=parseFolders(t.folders);
    

    var script='createBins('+JSON.stringify(JSON.stringify(paths))+')';
    cs.evalScript(script,function(res){
      
      if(res==='OK'){flash('✓ '+t.name,'ok');}
      else          {flash('Error','err');}
    });
  });
}

/* ════════════════════════════════
   MODE 2 — MANAGE OVERLAY
   ════════════════════════════════ */
var mgEditingIndex=-1;
var mgSelectedColor=PALETTE[0];

function openManage(){
  mgEditingIndex=-1;
  mgBuildColourPicker();
  mgRenderList();
  mgClearEditor();
  document.getElementById('manage-overlay').classList.add('open');
}
function closeManage(){
  document.getElementById('manage-overlay').classList.remove('open');
}

function mgBuildColourPicker(){
  var row=document.getElementById('mg-colour-row');
  row.innerHTML='';
  PALETTE.forEach(function(c){
    var s=document.createElement('div');
    s.className='colour-swatch'+(c===mgSelectedColor?' active':'');
    s.style.background=c;s.title=c;
    s.addEventListener('click',function(){
      mgSelectedColor=c;
      row.querySelectorAll('.colour-swatch').forEach(function(sw){
        sw.classList.toggle('active',sw.title===c);
      });
    });
    row.appendChild(s);
  });
}

function mgRenderList(){
  var list=document.getElementById('mg-tpl-list');
  if(!templates.length){
    list.innerHTML='<div class="mg-hint" style="padding:4px 2px">No templates yet.</div>';return;
  }
  list.innerHTML=templates.map(function(t,i){
    var color=t.color||PALETTE[i%PALETTE.length];
    var sel=mgEditingIndex===i?' selected':'';
    return '<div class="tmpl-item'+sel+'" onclick="mgSelectTpl('+i+')">'
      +'<div class="tmpl-swatch" style="background:'+color+'"></div>'
      +'<span class="tmpl-item-name">'+esc(t.name)+'</span>'
      +'<button class="tmpl-item-del" onclick="event.stopPropagation();mgDeleteTpl('+i+')">×</button>'
      +'</div>';
  }).join('');
}

function mgSelectTpl(i){
  mgEditingIndex=i;
  var t=templates[i];
  document.getElementById('mg-name-input').value   =t.name;
  document.getElementById('mg-label-input').value  =t.label!==undefined?t.label:String(i+1);
  document.getElementById('mg-folders-input').value=t.folders;
  mgSelectedColor=t.color||PALETTE[i%PALETTE.length];
  mgBuildColourPicker();mgRenderList();
}

function mgClearEditor(){
  mgEditingIndex=-1;
  document.getElementById('mg-name-input').value   ='';
  document.getElementById('mg-label-input').value  ='';
  document.getElementById('mg-folders-input').value='';
  mgSelectedColor=PALETTE[templates.length%PALETTE.length];
  mgBuildColourPicker();
}

function mgNewTemplate(){mgClearEditor();mgRenderList();document.getElementById('mg-name-input').focus();}

function mgSaveTemplate(){
  var name   =document.getElementById('mg-name-input').value.trim();
  var label  =document.getElementById('mg-label-input').value.trim();
  var folders=document.getElementById('mg-folders-input').value.trim();
  if(!name||!folders){flash('Name & folders required','err');return;}

  /* preview-parse so user sees errors early */
  var preview=parseFolders(folders);
  

  var entry={name:name,folders:folders,color:mgSelectedColor,label:label};
  if(mgEditingIndex>=0&&mgEditingIndex<templates.length){
    templates[mgEditingIndex]=entry;
  } else {
    templates.push(entry);mgEditingIndex=templates.length-1;
  }
  persistTemplates();renderButtons();mgRenderList();
  flash('Saved','ok');
}

function mgDeleteTpl(i){
  var name=templates[i]?templates[i].name:i;
  templates.splice(i,1);
  if(mgEditingIndex===i) mgClearEditor();
  else if(mgEditingIndex>i) mgEditingIndex--;
  persistTemplates();renderButtons();mgRenderList();
  
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── EXPOSE ── */
window.openManage=openManage;window.closeManage=closeManage;

window.mgNewTemplate=mgNewTemplate;window.mgSaveTemplate=mgSaveTemplate;
window.mgSelectTpl=mgSelectTpl;window.mgDeleteTpl=mgDeleteTpl;

/* ── BOOT ── */
loadTemplates();



}());
</script>
</body>
</html>
